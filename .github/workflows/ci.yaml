name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      PROJECT_NAME: "Neco CI"
      ENVIRONMENT: test
      SECRET_KEY: ci-secret-key-change-in-prod
      POSTGRES_SERVER: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv (Astral)
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python and Sync
        run: |
          uv python install $(cat .python-version)
          uv sync --all-extras --dev

      - name: Lint (ruff)
        run: uv run --package backend ruff check backend

      - name: Run tests
        run: uv run --package backend pytest -q backend/tests